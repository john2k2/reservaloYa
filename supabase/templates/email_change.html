<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Confirmá tu nuevo email en ReservaYa</title>
  </head>
  <body style="margin:0;padding:0;background:#f6f3ee;color:#181411;font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f6f3ee;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:600px;background:#fffaf3;border:1px solid #eadfce;border-radius:24px;overflow:hidden;">
            <tr>
              <td style="padding:32px 32px 16px;text-align:left;">
                <div style="font-size:13px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:#a16207;">ReservaYa</div>
                <h1 style="margin:18px 0 10px;font-size:28px;line-height:1.15;color:#181411;">Confirmá el cambio de email</h1>
                <p style="margin:0;color:#5f564b;font-size:16px;line-height:1.6;">Solicitaste usar <strong>{{ .NewEmail }}</strong> como nuevo correo de acceso.</p>
              </td>
            </tr>
            <tr>
              <td style="padding:16px 32px 8px;">
                <a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#181411;color:#fffaf3;text-decoration:none;border-radius:14px;padding:14px 22px;font-size:15px;font-weight:800;">Confirmar nuevo email</a>
              </td>
            </tr>
            <tr>
              <td style="padding:18px 32px 28px;">
                <p style="margin:0 0 12px;color:#5f564b;font-size:14px;line-height:1.6;">Si el botón no funciona, copiá y pegá este enlace:</p>
                <p style="margin:0;word-break:break-all;color:#7c6f60;font-size:12px;line-height:1.5;">{{ .ConfirmationURL }}</p>
              </td>
            </tr>
            <tr>
              <td style="background:#181411;padding:20px 32px;color:#d8cbb8;font-size:12px;line-height:1.6;">Si no pediste cambiar el correo de tu cuenta, revisá la seguridad de tu acceso.</td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
